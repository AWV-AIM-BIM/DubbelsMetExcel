name: Vendor AWVGeneric

on:
  schedule:
    - cron: "0 3 * * *"   # elke nacht om 03:00
  workflow_dispatch:

jobs:
  vendor-awvgeneric:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone upstream AWVGeneric
        run: |
          git clone https://github.com/AWV-AIM-BIM/AWVGeneric.git upstream

      - name: Replace vendored code
        run: |
          rm -rf vendor/AWVGeneric
          mkdir -p vendor
          cp -r upstream vendor/AWVGeneric
          rm -rf vendor/AWVGeneric/.git   # <<< BELANGRIJK

      - name: Commit changes if any
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add vendor/AWVGeneric
          git diff --quiet && echo "No changes" || git commit -m "Vendor update: AWVGeneric"
          git push
